<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — QuickBooks Training</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-badge large">QB</span>
      <h1>Admin Panel</h1>
      <p>Training portal administration</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <div class="mb-3">
        <label class="form-label fw-semibold">Admin Password</label>
        <input
          type="password"
          name="password"
          class="form-control form-control-lg"
          placeholder="Enter admin password"
          autofocus
          required
        >
      </div>
      <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
        Sign In
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}" class="small text-muted">← Back to training login</a>
    </div>
  </div>
</body>
</html>
